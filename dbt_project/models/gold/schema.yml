version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_key
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]

  - name: dim_products
    columns:
      - name: product_key
        tests: [not_null, unique]
      - name: product_number
        tests: [not_null]

  - name: fact_sales
    columns:
      - name: sales_key
        tests: [not_null, unique]
      - name: order_number
        tests: [not_null]
      - name: customer_key
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_key
