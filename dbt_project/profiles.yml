sqlserver_warehouse:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "{{ env_var('SQLSERVER_DRIVER', 'ODBC Driver 18 for SQL Server') }}"
      server: "{{ env_var('SQLSERVER_HOST', 'localhost') }}"
      port: "{{ env_var('SQLSERVER_PORT', '1433') | int }}"
      database: "{{ env_var('SQLSERVER_DATABASE', 'DataWarehouse') }}"
      schema: dbo
      user: "{{ env_var('SQLSERVER_USER', 'sa') }}"
      password: "{{ env_var('SQLSERVER_PASSWORD') }}"
      encrypt: true
      trust_cert: true
      threads: 4
